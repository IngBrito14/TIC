<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos | Odali</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* MISMO CSS EXACTO */
:root { --primary:#00f7ff; --bg:#0a0f1c; --card:#111827; --hover:#1f2937;}
body{font-family:Roboto;background:var(--bg);color:#fff;margin:0}
nav{position:sticky;top:0;background:#111827;padding:15px;text-align:center}
nav a{color:var(--primary);margin:0 15px;text-decoration:none}
header{text-align:center;padding:70px;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)}
header h1{font-family:Orbitron;color:var(--primary)}
section{padding:60px 20px;max-width:1000px;margin:auto}
h2{color:var(--primary)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:var(--card);padding:20px;border-radius:10px}
.card:hover{background:var(--hover);transform:translateY(-5px)}
.hidden{opacity:0;transform:translateY(30px);transition:.6s}
.show{opacity:1;transform:translateY(0)}
footer{text-align:center;padding:20px;background:#020617}
</style>
</head>

<body>

<nav>
<a href="index.html">Sobre mí</a>
<a href="proyectos.html">Proyectos</a>
<a href="youtube.html">YouTube</a>
<a href="contacto.html">Contacto</a>
</nav>

<header><h1>Proyectos</h1></header>

<section class="hidden">
<h2>Proyectos</h2>
<div class="cards">
<div class="card"><h3>Auditoría TI</h3></div>
<div class="card"><h3>Sistema de Incidencias</h3></div>
</div>
</section>

<footer>© 2026 Odali</footer>

<script>
const e=document.querySelectorAll('.hidden');
const o=new IntersectionObserver(r=>{r.forEach(x=>{if(x.isIntersecting){x.target.classList.add('show')}})});
e.forEach(el=>o.observe(el));
</script>

</body>
</html>
